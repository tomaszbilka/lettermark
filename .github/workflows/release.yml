name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: build and publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # setup-node writes _authToken=${NODE_AUTH_TOKEN}; empty value blocks OIDC.
      - name: Prepare npmrc for Trusted Publishing
        run: |
          NPMRC_PATH="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          if [ -f "$NPMRC_PATH" ]; then
            sed -i '/_authToken/d' "$NPMRC_PATH"
            sed -i '/always-auth/d' "$NPMRC_PATH"
          fi

      - name: Publish lettermark
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          if npm view "${NAME}@${VERSION}" version 2>/dev/null; then
            echo "Skip ${NAME}@${VERSION} — already on npm"
          else
            env -u NODE_AUTH_TOKEN npx -p npm@latest -y npm publish --provenance --access public
          fi
        working-directory: packages/lettermark

      - name: Publish @lettermark/react
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          if npm view "${NAME}@${VERSION}" version 2>/dev/null; then
            echo "Skip ${NAME}@${VERSION} — already on npm"
          else
            env -u NODE_AUTH_TOKEN npx -p npm@latest -y npm publish --provenance --access public
          fi
        working-directory: packages/react
